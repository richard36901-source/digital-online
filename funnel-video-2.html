<script>
const PAGE='funnel_video_2',WEBHOOK='https://hook.eu1.make.com/jp6ukjt7tpk3y4yly9c691g01f47cq8q',NEXT='funnel-video-3.html';
window.dataLayer=window.dataLayer||[];
const P=new URLSearchParams(location.search);
const variant=P.get('variant')||'',sup=P.get('supplier')||'',src=P.get('utm_source')||'';
dataLayer.push({event:'page_view',page:PAGE,source_variant:variant,supplier:sup,utm_source:src});
if(typeof fbq!=='undefined')fbq('track','PageView');
const sd={};[25,50,75,100].forEach(d=>sd[d]=0);
window.addEventListener('scroll',()=>{
  const s=document.body.scrollHeight-window.innerHeight;if(!s)return;
  const p=Math.round(window.scrollY/s*100);
  [25,50,75,100].forEach(d=>{if(!sd[d]&&p>=d){sd[d]=1;dataLayer.push({event:'scroll_depth',depth:d+'%',page:PAGE});}}); 
},{passive:true});
const t0=Date.now();
const vm={};[25,50,75,100].forEach(m=>vm[m]=0);
window.addEventListener('load',()=>{
  const iframe=document.getElementById('vimeoPlayer');
  const player=new Vimeo.Player(iframe);
  let lastTime=0,isSeeking=false;
  player.on('timeupdate',(data)=>{
    if(!isSeeking&&data.seconds-lastTime>2){
      isSeeking=true;
      player.setCurrentTime(lastTime).then(()=>{isSeeking=false;});
      return;
    }
    if(!isSeeking)lastTime=data.seconds;
    const pct=data.percent*100;
    [25,50,75,100].forEach(m=>{
      if(!vm[m]&&pct>=m){vm[m]=1;dataLayer.push({event:'video_progress',milestone:m+'%',time:Math.round(data.seconds),page:PAGE});}
    });
  });
  player.on('play',(data)=>{dataLayer.push({event:'video_play',page:PAGE,time:Math.round(data.seconds)});});
  player.on('pause',(data)=>{
    const pos=Math.round(data.seconds),pct=Math.round(data.percent*100);
    dataLayer.push({event:'video_pause',page:PAGE,time:pos,pct_watched:pct});
    fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:'video_pause',page:PAGE,position_sec:pos,pct_watched:pct,supplier:sup,utm_source:src,timestamp:new Date().toLocaleString('he-IL')})}).catch(()=>{});
  });
  player.on('ended',()=>{
    dataLayer.push({event:'video_ended',page:PAGE});
    if(typeof fbq!=='undefined')fbq('track','ViewContent',{content_name:PAGE});
    fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({event:'video_completed',page:PAGE,pct_watched:100,supplier:sup,utm_source:src,timestamp:new Date().toLocaleString('he-IL')})}).catch(()=>{});
    const overlay=document.getElementById('redirectOverlay');
    const bar=document.getElementById('redirectBar');
    overlay.classList.add('visible');
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{bar.style.width='100%';});});
    setTimeout(()=>{location.href=NEXT;},3000);
  });
  window.addEventListener('beforeunload',()=>{
    player.getCurrentTime().then((pos)=>{
      player.getDuration().then((dur)=>{
        const pct=dur?Math.round((pos/dur)*100):0;
        if(navigator.sendBeacon)navigator.sendBeacon(WEBHOOK,JSON.stringify({event:'page_exit',page:PAGE,position_sec:Math.round(pos),pct_watched:pct,seconds_on_page:Math.round((Date.now()-t0)/1000),supplier:sup,utm_source:src,timestamp:new Date().toLocaleString('he-IL')}));
        dataLayer.push({event:'page_time',seconds:Math.round((Date.now()-t0)/1000),page:PAGE,video_pos:Math.round(pos),pct_watched:pct});
      });
    });
  });
});
</script>
